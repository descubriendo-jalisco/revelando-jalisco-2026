<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Viva</title>
    <style>
        body {
            background-color: #000;
            color: #ccc;
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            background-image: radial-gradient(circle at center, #1a1515 0%, #000 85%);
        }

        .memorial-container {
            max-width: 800px;
            padding: 40px;
            opacity: 0;
            animation: fadeIn 3s forwards 1s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* El objeto personal que sostiene la memoria */
        .token-image {
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
            /* Aquí irá la foto real de la prenda / objeto */
        }

        .token-image img {
            max-width: 100%;
            max-height: 100%;
            filter: grayscale(100%);
            opacity: 0.8;
            transition: 0.8s;
        }

        .token-image:hover img {
            filter: grayscale(0%);
            opacity: 1;
        }

        /* Espacio para la historia sin parafernalia ni frases inventadas */
        .historia-sensible {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #d1c8b4;
            max-width: 600px;
            margin: 0 auto;
            text-align: justify;
        }

        .historia-sensible p {
            margin-bottom: 20px;
        }

        .reproductor-audio {
            margin-top: 50px;
        }

        /* Control de audio minimalista y respetuoso */
        audio {
            filter: invert(100%) grayscale(100%);
            width: 250px;
            height: 35px;
            opacity: 0.6;
            transition: 0.3s;
        }

        audio:hover {
            opacity: 1;
        }

        .volver {
            display: block;
            margin-top: 80px;
            color: #333;
            text-decoration: none;
            font-size: 0.8rem;
            font-family: Arial, sans-serif;
            letter-spacing: 1px;
            transition: 0.5s;
        }

        .volver:hover {
            color: #888;
        }
    
        .gallery-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 40px;
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding-bottom: 15px;
            scroll-snap-type: x mandatory;
        }
        .gallery-container::-webkit-scrollbar {
            display: none;
        }
        .gallery-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: #d1c8b4;
            border: 1px solid #444;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 10;
            transition: 0.3s;
        }
        .slider-btn:hover {
            background: rgba(0,0,0,0.8);
            color: #fff;
            border-color: #8b1c31;
        }
        .slider-left { left: -60px; }
        .slider-right { right: -60px; }
        
        .gallery-container::-webkit-scrollbar-track {
            background: #111;
        }
        .gallery-container::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        .gallery-item {
            flex: 0 0 100%;
            scroll-snap-align: center;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            padding: 10px;
        }
        .gallery-item img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            filter: grayscale(100%) contrast(1.2);
            opacity: 0.8;
            transition: 0.8s ease;
        }
        .gallery-item:hover img {
            filter: grayscale(0%) contrast(1);
            opacity: 1;
        }

    </style>
</head>

<body>
<div id="main-wrapper" style="min-height: 100vh;">

    <div class="memorial-container">

        <!-- Galería deslizable de Testimonio Héctor -->
        <div class="gallery-wrapper">
            <button class="slider-btn slider-left" onclick="document.querySelector('.gallery-container').scrollBy({left:-600, behavior:'smooth'})">❮</button>
            <button class="slider-btn slider-right" onclick="document.querySelector('.gallery-container').scrollBy({left:600, behavior:'smooth'})">❯</button>
            <div class="gallery-container" title="Desliza para ver la galería completa">
                
            <div class="gallery-item"><img src="IMAGENES_ARTÍCULOS/IMG_TESTIMONIO_HECTOR/WhatsApp Image 2026-03-17 at 11.12.59 PM.jpeg" alt="Archivo 1">
            </div>
        </div>
            <div class="gallery-item"><img src="IMAGENES_ARTÍCULOS/IMG_TESTIMONIO_HECTOR/WhatsApp Image 2026-03-17 at 11.12.59 PM (1).jpeg" alt="Archivo 2"></div>
            <div class="gallery-item"><img src="IMAGENES_ARTÍCULOS/IMG_TESTIMONIO_HECTOR/WhatsApp Image 2026-03-17 at 11.13.00 PM (1).jpeg" alt="Archivo 3"></div>
            <div class="gallery-item"><img src="IMAGENES_ARTÍCULOS/IMG_TESTIMONIO_HECTOR/WhatsApp Image 2026-03-17 at 11.13.00 PM (2).jpeg" alt="Archivo 4"></div>
            <div class="gallery-item"><img src="IMAGENES_ARTÍCULOS/IMG_TESTIMONIO_HECTOR/WhatsApp Image 2026-03-17 at 11.13.00 PM (3).jpeg" alt="Archivo 5"></div>
            <div class="gallery-item"><img src="IMAGENES_ARTÍCULOS/IMG_TESTIMONIO_HECTOR/WhatsApp Image 2026-03-17 at 11.13.00 PM (4).jpeg" alt="Archivo 6"></div>
        </div>

        

        <!-- El audio original / ambiental -->
        <div class="reproductor-audio">
            <p style="font-size: 0.8rem; color: #555; margin-bottom: 10px; font-family: sans-serif;">[ TESTIMONIO: HÉCTOR ]</p>
            <audio controls id="audio-testimonio">
                <source src="AUDIOS/TESTIMONIO_HECTOR.mp3" type="audio/mpeg">
                Tu navegador no soporta el formato de audio.
            </audio>
        </div>

        <a href="index.html" class="volver">volver a la superficie</a>

    </div>

</div>
<script src="rostros.js"></script>
<script src="trap.js"></script>

    <script>
        // Rudimentary API tracker for audio interaction
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('audio-testimonio');
            let played = false;
            if(audio) {
                audio.addEventListener('play', () => {
                    if(!played) {
                        played = true;
                        fetch("https://api.counterapi.dev/v1/revelando_jalisco_2026/audio_hector/up").catch(e => console.log(e));
                    }
                });
            }
        });
    </script>
