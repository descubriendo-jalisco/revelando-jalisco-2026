<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Viva</title>
    <style>
        body {
            background-color: #000;
            color: #ccc;
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            background-image: radial-gradient(circle at center, #1a1515 0%, #000 85%);
        }

        .memorial-container {
            max-width: 800px;
            padding: 40px;
            opacity: 0;
            animation: fadeIn 3s forwards 1s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* El objeto personal que sostiene la memoria */
        .token-image {
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
            /* Aquí irá la foto real de la prenda / objeto */
        }

        .token-image img {
            max-width: 100%;
            max-height: 100%;
            filter: grayscale(100%);
            opacity: 0.8;
            transition: 0.8s;
        }

        .token-image:hover img {
            filter: grayscale(0%);
            opacity: 1;
        }

        /* Espacio para la historia sin parafernalia ni frases inventadas */
        .historia-sensible {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #d1c8b4;
            max-width: 600px;
            margin: 0 auto;
            text-align: justify;
        }

        .historia-sensible p {
            margin-bottom: 20px;
        }

        .reproductor-audio {
            margin-top: 50px;
        }

        /* Control de audio minimalista y respetuoso */
        audio {
            filter: invert(100%) grayscale(100%);
            width: 250px;
            height: 35px;
            opacity: 0.6;
            transition: 0.3s;
        }

        audio:hover {
            opacity: 1;
        }

        .volver {
            display: block;
            margin-top: 80px;
            color: #333;
            text-decoration: none;
            font-size: 0.8rem;
            font-family: Arial, sans-serif;
            letter-spacing: 1px;
            transition: 0.5s;
        }

        .volver:hover {
            color: #888;
        }
    </style>
</head>

<body>

    <div class="memorial-container">

        <!-- Contenedor del Efecto Personal -->
        <div class="token-image">
            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><rect width='300' height='300' fill='%23111'/><text x='110' y='155' fill='%23444' font-family='sans-serif' font-size='12'>[ FOTO DEL OBJETO ]</text></svg>"
                alt="Objeto recuperado">
        </div>

        <!-- Espacio en crudo para la historia real -->
        <div class="historia-sensible">
            <p>
                [Espacio reservado para la historia de desaparición real ligada a este objeto. Texto directo, crudo y
                respetuoso obtenido del trabajo documental de los colectivos y madres buscadoras].
            </p>
        </div>

        <!-- El audio original / ambiental -->
        <div class="reproductor-audio">
            <p style="font-size: 0.8rem; color: #555; margin-bottom: 10px; font-family: sans-serif;">[ TESTIMONIO DE VOZ
                ]</p>
            <audio controls>
                <source src="nota_de_voz_real.mp3" type="audio/mpeg">
                Tu navegador no soporta el formato de audio.
            </audio>
        </div>

        <a href="index.html" class="volver">volver a la superficie</a>

    </div>

<script src="rostros.js"></script>
<script src="trap.js"></script>
</body>

</html>
